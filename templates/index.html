<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism — Multi-Agent Productivity Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .pulse-anim { animation: pulse 1.5s ease-in-out infinite; }
        .spinner { animation: spin 0.8s linear infinite; border: 2px solid #e5e7eb; border-top-color: currentColor; border-radius: 50%; width: 16px; height: 16px; display: inline-block; }
        .shimmer-bg { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.1); }
        .tool-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-red-500 via-blue-500 to-emerald-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h1 class="text-xl font-bold text-white">Prism</h1>
                <span class="text-xs text-slate-500 ml-2">Multi-Agent Productivity Assistant</span>
            </div>
            <nav class="flex gap-1">
                <button onclick="showView('ask')" id="nav-ask" class="nav-btn px-3 py-1.5 rounded-lg text-sm font-medium text-white bg-slate-700">Ask</button>
                <button onclick="showView('tasks')" id="nav-tasks" class="nav-btn px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white">Tasks</button>
                <button onclick="showView('notes')" id="nav-notes" class="nav-btn px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white">Notes</button>
                <button onclick="showView('history')" id="nav-history" class="nav-btn px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white">History</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6">

        <!-- ASK VIEW -->
        <div id="view-ask">
            <!-- Stats banner -->
            <div class="flex gap-4 mb-6">
                <div class="glass rounded-lg px-4 py-2 flex items-center gap-2">
                    <span class="text-slate-400 text-sm">Tasks</span>
                    <span id="stat-tasks" class="text-white font-bold">-</span>
                </div>
                <div class="glass rounded-lg px-4 py-2 flex items-center gap-2">
                    <span class="text-slate-400 text-sm">Notes</span>
                    <span id="stat-notes" class="text-white font-bold">-</span>
                </div>
                <div class="glass rounded-lg px-4 py-2 flex items-center gap-2">
                    <span class="text-slate-400 text-sm">Sessions</span>
                    <span id="stat-sessions" class="text-white font-bold">-</span>
                </div>
            </div>

            <!-- Input section -->
            <div class="glass rounded-xl p-6 mb-6">
                <div class="flex gap-3">
                    <input id="query-input" type="text" placeholder="What would you like to accomplish?"
                        class="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm"
                        onkeydown="if(event.key==='Enter')runPrism()">
                    <button onclick="runPrism()" id="run-btn"
                        class="px-6 py-3 bg-gradient-to-r from-red-500 via-blue-500 to-emerald-500 text-white font-semibold rounded-lg hover:opacity-90 transition-opacity text-sm whitespace-nowrap">
                        Run Prism
                    </button>
                </div>
                <div class="flex gap-2 mt-3 flex-wrap">
                    <button onclick="setQuery('Plan my week - I need to finish the Q2 report and prepare for the client meeting on Friday')" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition">Plan my week</button>
                    <button onclick="setQuery('Check my unread emails and create tasks for anything urgent')" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition">Process inbox</button>
                    <button onclick="setQuery('What tasks are overdue? Summarize the situation and suggest next steps')" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition">Overdue check</button>
                    <button onclick="setQuery('Find free time tomorrow and schedule a 2-hour deep work block for the API docs')" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition">Schedule focus time</button>
                </div>
            </div>

            <!-- Agent columns -->
            <div id="agent-area" class="hidden">
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <!-- Red Agent -->
                    <div id="col-red" class="glass rounded-xl overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between" style="background: rgba(239,68,68,0.1)">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                                <span class="font-semibold text-red-400 text-sm">Red — Speed</span>
                            </div>
                            <div id="status-red" class="flex items-center gap-1 text-xs text-slate-500">
                                <span>Waiting</span>
                            </div>
                        </div>
                        <div id="tools-red" class="px-4 py-2 space-y-1 border-b border-slate-700/30 min-h-[40px] max-h-[120px] overflow-y-auto"></div>
                        <div id="response-red" class="px-4 py-3 text-sm text-slate-300 max-h-[300px] overflow-y-auto"></div>
                        <div id="time-red" class="px-4 py-2 border-t border-slate-700/30 text-xs text-slate-500 hidden"></div>
                    </div>

                    <!-- Blue Agent -->
                    <div id="col-blue" class="glass rounded-xl overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between" style="background: rgba(59,130,246,0.1)">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                                <span class="font-semibold text-blue-400 text-sm">Blue — Depth</span>
                            </div>
                            <div id="status-blue" class="flex items-center gap-1 text-xs text-slate-500">
                                <span>Waiting</span>
                            </div>
                        </div>
                        <div id="tools-blue" class="px-4 py-2 space-y-1 border-b border-slate-700/30 min-h-[40px] max-h-[120px] overflow-y-auto"></div>
                        <div id="response-blue" class="px-4 py-3 text-sm text-slate-300 max-h-[300px] overflow-y-auto"></div>
                        <div id="time-blue" class="px-4 py-2 border-t border-slate-700/30 text-xs text-slate-500 hidden"></div>
                    </div>

                    <!-- Green Agent -->
                    <div id="col-green" class="glass rounded-xl overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between" style="background: rgba(16,185,129,0.1)">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                                <span class="font-semibold text-emerald-400 text-sm">Green — Creative</span>
                            </div>
                            <div id="status-green" class="flex items-center gap-1 text-xs text-slate-500">
                                <span>Waiting</span>
                            </div>
                        </div>
                        <div id="tools-green" class="px-4 py-2 space-y-1 border-b border-slate-700/30 min-h-[40px] max-h-[120px] overflow-y-auto"></div>
                        <div id="response-green" class="px-4 py-3 text-sm text-slate-300 max-h-[300px] overflow-y-auto"></div>
                        <div id="time-green" class="px-4 py-2 border-t border-slate-700/30 text-xs text-slate-500 hidden"></div>
                    </div>
                </div>

                <!-- Merge panel -->
                <div id="merge-panel" class="glass rounded-xl overflow-hidden hidden">
                    <div class="px-4 py-3 border-b border-slate-700/50 flex items-center gap-2" style="background: linear-gradient(90deg, rgba(239,68,68,0.08), rgba(59,130,246,0.08), rgba(16,185,129,0.08))">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        <span class="font-semibold text-purple-300 text-sm">Orchestrator Merge</span>
                        <div id="merge-status" class="ml-auto"></div>
                    </div>
                    <div id="merge-content" class="px-4 py-4 text-sm text-slate-300"></div>
                    <div id="contributions" class="px-4 pb-4"></div>
                </div>
            </div>
        </div>

        <!-- TASKS VIEW -->
        <div id="view-tasks" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white">Tasks</h2>
                <div class="flex gap-2">
                    <select id="task-filter-status" onchange="loadTasks()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300">
                        <option value="">All Status</option>
                        <option value="todo">Todo</option>
                        <option value="in_progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                    <select id="task-filter-priority" onchange="loadTasks()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300">
                        <option value="">All Priority</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
            </div>
            <div id="tasks-list" class="space-y-2"></div>
        </div>

        <!-- NOTES VIEW -->
        <div id="view-notes" class="hidden">
            <h2 class="text-lg font-bold text-white mb-4">Notes</h2>
            <div id="notes-list" class="space-y-3"></div>
        </div>

        <!-- HISTORY VIEW -->
        <div id="view-history" class="hidden">
            <h2 class="text-lg font-bold text-white mb-4">Session History</h2>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 mt-12 py-4 text-center text-xs text-slate-600">
        Powered by Gemini 2.5 Flash + MCP + AlloyDB + FastAPI | Built for Gen AI Academy APAC Edition
    </footer>

<script>
// ── State ──
let currentView = 'ask';

// ── Navigation ──
function showView(view) {
    document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('view-' + view).classList.remove('hidden');
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('text-white', 'bg-slate-700');
        btn.classList.add('text-slate-400');
    });
    const btn = document.getElementById('nav-' + view);
    btn.classList.add('text-white', 'bg-slate-700');
    btn.classList.remove('text-slate-400');
    currentView = view;
    if (view === 'tasks') loadTasks();
    if (view === 'notes') loadNotes();
    if (view === 'history') loadHistory();
}

function setQuery(q) {
    document.getElementById('query-input').value = q;
    document.getElementById('query-input').focus();
}

// ── Stats ──
async function loadStats() {
    try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        document.getElementById('stat-tasks').textContent = data.tasks || 0;
        document.getElementById('stat-notes').textContent = data.notes || 0;
        document.getElementById('stat-sessions').textContent = data.sessions || 0;
    } catch(e) {}
}

// ── Run Prism (SSE) ──
function runPrism() {
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;

    // Reset UI
    const area = document.getElementById('agent-area');
    area.classList.remove('hidden');
    ['red', 'blue', 'green'].forEach(a => {
        document.getElementById('tools-' + a).innerHTML = '';
        document.getElementById('response-' + a).innerHTML = '';
        document.getElementById('time-' + a).classList.add('hidden');
        document.getElementById('status-' + a).innerHTML = '<span>Waiting</span>';
    });
    document.getElementById('merge-panel').classList.add('hidden');
    document.getElementById('merge-content').innerHTML = '';
    document.getElementById('contributions').innerHTML = '';

    // Disable button
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:white"></span> Running...';

    // SSE connection
    const url = '/api/prism?' + new URLSearchParams({ query });
    const es = new EventSource(url);

    es.addEventListener('agent_start', (e) => {
        const data = JSON.parse(e.data);
        const el = document.getElementById('status-' + data.agent);
        el.innerHTML = '<span class="spinner" style="border-top-color:' + data.color + '"></span><span>Working...</span>';
    });

    es.addEventListener('tool_call', (e) => {
        const data = JSON.parse(e.data);
        const el = document.getElementById('tools-' + data.agent);
        const badge = document.createElement('div');
        badge.className = 'fade-in flex items-center gap-1.5';
        badge.innerHTML = `<span class="tool-badge text-slate-900" style="background:${data.color}">${data.tool}</span>
            <span class="text-xs text-slate-500 truncate">${truncArgs(data.args)}</span>`;
        el.appendChild(badge);
        el.scrollTop = el.scrollHeight;
    });

    es.addEventListener('tool_result', (e) => {
        // Visual feedback already via tool_call badges
    });

    es.addEventListener('agent_done', (e) => {
        const data = JSON.parse(e.data);
        const a = data.agent;
        // Status
        const statusEl = document.getElementById('status-' + a);
        if (data.error) {
            statusEl.innerHTML = '<span class="text-red-400">Error</span>';
        } else {
            statusEl.innerHTML = '<span class="text-emerald-400">Done</span>';
        }
        // Response
        const respEl = document.getElementById('response-' + a);
        respEl.innerHTML = data.error
            ? `<div class="text-red-400">${esc(data.error)}</div>`
            : formatResponse(data.response);
        respEl.classList.add('fade-in');
        // Time
        const timeEl = document.getElementById('time-' + a);
        timeEl.textContent = `${(data.execution_time_ms / 1000).toFixed(1)}s | ${data.tool_calls?.length || 0} tool calls`;
        timeEl.classList.remove('hidden');
    });

    es.addEventListener('merge_start', () => {
        const panel = document.getElementById('merge-panel');
        panel.classList.remove('hidden');
        panel.classList.add('fade-in');
        document.getElementById('merge-status').innerHTML = '<span class="spinner" style="border-top-color:#a78bfa"></span>';
        document.getElementById('merge-content').innerHTML = '<div class="shimmer-bg h-4 rounded w-3/4 mb-2"></div><div class="shimmer-bg h-4 rounded w-1/2"></div>';
    });

    es.addEventListener('merge_done', (e) => {
        const data = JSON.parse(e.data);
        const result = data.result || {};
        document.getElementById('merge-status').innerHTML = '<span class="text-emerald-400 text-xs">Complete</span>';
        document.getElementById('merge-content').innerHTML = formatResponse(result.merged_response || 'No merge result');

        // Contributions
        const contribs = result.contributions || [];
        if (contribs.length > 0) {
            const contEl = document.getElementById('contributions');
            const colors = { red: '#EF4444', blue: '#3B82F6', green: '#10B981' };
            contEl.innerHTML = '<div class="text-xs font-semibold text-slate-400 mb-2">Contributions</div>' +
                contribs.map(c => `<div class="flex items-start gap-2 mb-2">
                    <span class="tool-badge text-white" style="background:${colors[c.agent] || '#6b7280'}">${c.agent}</span>
                    <div class="text-xs text-slate-400"><strong class="text-slate-300">${esc(c.kept || '')}</strong>
                    ${c.reason ? ' — ' + esc(c.reason) : ''}</div>
                </div>`).join('');
        }

        // Verdict
        if (result.verdict) {
            document.getElementById('merge-content').innerHTML +=
                `<div class="mt-3 px-3 py-2 rounded-lg bg-purple-500/10 border border-purple-500/20 text-xs text-purple-300">${esc(result.verdict)}</div>`;
        }

        finish();
    });

    es.addEventListener('error', (e) => {
        const data = e.data ? JSON.parse(e.data) : {};
        console.error('Prism error:', data);
        finish();
    });

    es.onerror = () => {
        es.close();
        finish();
    };

    function finish() {
        es.close();
        btn.disabled = false;
        btn.innerHTML = 'Run Prism';
        loadStats();
    }
}

// ── Tasks View ──
async function loadTasks() {
    const status = document.getElementById('task-filter-status').value;
    const priority = document.getElementById('task-filter-priority').value;
    const params = new URLSearchParams();
    if (status) params.set('status', status);
    if (priority) params.set('priority', priority);
    try {
        const res = await fetch('/api/tasks?' + params);
        const tasks = await res.json();
        const el = document.getElementById('tasks-list');
        if (!tasks.length) {
            el.innerHTML = '<div class="text-slate-500 text-sm">No tasks found</div>';
            return;
        }
        el.innerHTML = tasks.map(t => {
            const statusColors = { todo: 'bg-slate-600', in_progress: 'bg-amber-600', done: 'bg-emerald-600' };
            const prioColors = { high: 'text-red-400', medium: 'text-amber-400', low: 'text-slate-400' };
            return `<div class="glass rounded-lg px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-xs px-2 py-0.5 rounded ${statusColors[t.status] || 'bg-slate-600'} text-white">${t.status}</span>
                    <div>
                        <div class="text-sm text-white font-medium">${esc(t.title)}</div>
                        <div class="text-xs text-slate-500">${t.description ? esc(t.description.slice(0, 80)) : ''}</div>
                    </div>
                </div>
                <div class="flex items-center gap-3 text-xs">
                    ${t.tags?.map(tag => `<span class="px-2 py-0.5 rounded bg-slate-800 text-slate-400">${esc(tag)}</span>`).join('') || ''}
                    <span class="${prioColors[t.priority] || ''}">${t.priority}</span>
                    ${t.due_date ? `<span class="text-slate-500">${new Date(t.due_date).toLocaleDateString()}</span>` : ''}
                    <span class="text-slate-600 text-[10px]">${t.created_by}</span>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        document.getElementById('tasks-list').innerHTML = '<div class="text-red-400 text-sm">Failed to load tasks</div>';
    }
}

// ── Notes View ──
async function loadNotes() {
    try {
        const res = await fetch('/api/notes');
        const notes = await res.json();
        const el = document.getElementById('notes-list');
        if (!notes.length) {
            el.innerHTML = '<div class="text-slate-500 text-sm">No notes found</div>';
            return;
        }
        el.innerHTML = notes.map(n => `<div class="glass rounded-lg px-4 py-3">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-white font-medium">${esc(n.title)}</span>
                <div class="flex items-center gap-2">
                    ${n.linked_task_id ? `<span class="text-xs px-2 py-0.5 rounded bg-blue-900/50 text-blue-300">Task #${n.linked_task_id}</span>` : ''}
                    ${n.tags?.map(tag => `<span class="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">${esc(tag)}</span>`).join('') || ''}
                </div>
            </div>
            <pre class="text-xs text-slate-400 whitespace-pre-wrap font-sans">${esc(n.content?.slice(0, 300) || '')}${n.content?.length > 300 ? '...' : ''}</pre>
        </div>`).join('');
    } catch(e) {
        document.getElementById('notes-list').innerHTML = '<div class="text-red-400 text-sm">Failed to load notes</div>';
    }
}

// ── History View ──
async function loadHistory() {
    try {
        const res = await fetch('/api/history');
        const sessions = await res.json();
        const el = document.getElementById('history-list');
        if (!sessions.length) {
            el.innerHTML = '<div class="text-slate-500 text-sm">No sessions yet. Run your first Prism query!</div>';
            return;
        }
        el.innerHTML = sessions.map(s => {
            let merged = '';
            try {
                const m = typeof s.merged_result === 'string' ? JSON.parse(s.merged_result) : s.merged_result;
                merged = m?.merged_response || JSON.stringify(m).slice(0, 200);
            } catch { merged = String(s.merged_result || '').slice(0, 200); }
            return `<div class="glass rounded-lg px-4 py-3">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm text-white font-medium">${esc(s.user_request)}</span>
                    <span class="text-xs text-slate-500">${new Date(s.created_at).toLocaleString()}</span>
                </div>
                <div class="text-xs text-slate-400">${esc(merged)}</div>
            </div>`;
        }).join('');
    } catch(e) {
        document.getElementById('history-list').innerHTML = '<div class="text-red-400 text-sm">Failed to load history</div>';
    }
}

// ── Helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function truncArgs(args) {
    const s = JSON.stringify(args || {});
    return s.length > 60 ? s.slice(0, 60) + '...' : s;
}
function formatResponse(text) {
    if (!text) return '';
    return text.split('\n').map(line => {
        line = esc(line);
        if (line.startsWith('**') && line.endsWith('**')) return `<div class="font-semibold text-white mt-2">${line.slice(2, -2)}</div>`;
        if (line.startsWith('- ') || line.startsWith('* ')) return `<div class="ml-3 before:content-[''] before:mr-2 before:text-slate-500">${line}</div>`;
        if (line.match(/^\d+\./)) return `<div class="ml-3">${line}</div>`;
        if (!line.trim()) return '<div class="h-2"></div>';
        return `<div>${line}</div>`;
    }).join('');
}

// ── Init ──
loadStats();
</script>
</body>
</html>
